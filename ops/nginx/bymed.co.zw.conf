server {
    listen 80;
    listen [::]:80;
    server_name bymed.co.zw;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bymed.co.zw;

    ssl_certificate /etc/letsencrypt/live/bymed.co.zw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bymed.co.zw/privkey.pem;

    # Existing app routes should remain above/below this block as needed.
    location /jenkins/ {
        proxy_pass http://127.0.0.1:8081/jenkins/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 90s;
    }
}
