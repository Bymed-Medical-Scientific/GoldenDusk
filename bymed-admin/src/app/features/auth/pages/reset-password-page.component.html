<main class="login-page">
  <div class="login-theme-toggle">
    <button
      pButton
      [text]="true"
      [rounded]="true"
      type="button"
      class="theme-btn"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      <i class="pi" [class.pi-moon]="!isDarkMode()" [class.pi-sun]="isDarkMode()" aria-hidden="true"></i>
    </button>
  </div>

  <section class="login-card">
    <div class="logo-wrap" aria-hidden="true">
      <i class="pi pi-shield"></i>
    </div>
    <header>
      <h1>Reset password</h1>
      <p class="subtitle">Set a new password for your admin account</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
      <div class="field-group">
        <label for="newPassword">New password</label>
        <p-password
          inputId="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="password-field"
          autocomplete="new-password"
          placeholder="New password"
        ></p-password>
      </div>

      <div class="field-group">
        <label for="confirmPassword">Confirm password</label>
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="password-field"
          autocomplete="new-password"
          placeholder="Confirm password"
        ></p-password>
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      @if (successMessage()) {
        <p class="info-text">{{ successMessage() }}</p>
      }

      <button pButton type="submit" class="signin-btn" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <p-progressSpinner [style]="{ width: '18px', height: '18px' }" strokeWidth="6"></p-progressSpinner>
          <span>Resetting...</span>
        } @else {
          <span>Reset password</span>
        }
      </button>

      <p class="signup-prompt">
        Back to
        <a href="" (click)="$event.preventDefault(); goToLogin()">login</a>
      </p>
    </form>
  </section>
</main>
