<section class="auth-page">
  <div class="auth-page__gradient auth-page__gradient--top"></div>
  <div class="auth-page__gradient auth-page__gradient--bottom"></div>

  <div class="theme-toggle-wrapper">
    <button
      pButton
      type="button"
      class="theme-toggle-button p-button-rounded p-button-text"
      [icon]="isDarkMode() ? 'pi pi-sun' : 'pi pi-moon'"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    ></button>
  </div>

  <article class="auth-card auth-card--wide">
    <header class="auth-card__header">
      <h1>Reset password</h1>
      <p>Set a new password for your admin account.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="auth-field">
        <label for="newPassword">New password</label>
        <p-password
          inputId="newPassword"
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
        ></p-password>
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
        ></p-password>
      </div>

      @if (errorMessage()) {
        <p class="auth-card__error">{{ errorMessage() }}</p>
      }

      @if (successMessage()) {
        <p class="auth-card__success">{{ successMessage() }}</p>
      }

      <button pButton type="submit" class="auth-card__submit" [disabled]="isSubmitting()" [loading]="isSubmitting()">
        Reset password
      </button>
    </form>

    <button pButton type="button" class="p-button-text" (click)="goToLogin()">Back to login</button>
  </article>
</section>
