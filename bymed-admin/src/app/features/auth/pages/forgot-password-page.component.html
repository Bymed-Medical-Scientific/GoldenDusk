<main class="login-page">
  <div class="login-theme-toggle">
    <button
      pButton
      [text]="true"
      [rounded]="true"
      type="button"
      class="theme-btn"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      <i class="pi" [class.pi-moon]="!isDarkMode()" [class.pi-sun]="isDarkMode()" aria-hidden="true"></i>
    </button>
  </div>

  <section class="login-card">
    <div class="logo-wrap" aria-hidden="true">
      <i class="pi pi-envelope"></i>
    </div>
    <h1>Reset password</h1>
    <p class="subtitle">Enter your email and we will send you a reset link</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field-group">
        <label for="email">Email</label>
        <input
          id="email"
          pInputText
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@bymed.com"
        />
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      @if (successMessage()) {
        <p class="info-banner">{{ successMessage() }}</p>
      }

      <button pButton type="submit" class="signin-btn" [disabled]="isSubmitting() || !!successMessage()">
        @if (isSubmitting()) {
          <p-progressSpinner [style]="{ width: '18px', height: '18px' }" strokeWidth="6"></p-progressSpinner>
          <span>Sending...</span>
        } @else {
          <span>Send reset link</span>
        }
      </button>

      <p class="signup-prompt">
        <a routerLink="/login">Back to sign in</a>
      </p>
    </form>
  </section>
</main>
