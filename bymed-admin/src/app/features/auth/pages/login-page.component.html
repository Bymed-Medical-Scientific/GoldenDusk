<main class="login-page">
  <div class="login-theme-toggle">
    <button
      pButton
      [text]="true"
      [rounded]="true"
      type="button"
      class="theme-btn"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
      (click)="toggleTheme()"
    >
      <i class="pi" [class.pi-moon]="!isDarkMode()" [class.pi-sun]="isDarkMode()" aria-hidden="true"></i>
    </button>
  </div>

  <section class="login-card">
    <div class="logo-wrap" aria-hidden="true">
      <i class="pi pi-shield"></i>
    </div>
    <h1>Welcome to ByMed Admin</h1>
    <p class="subtitle">Sign in to continue</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
      <div class="field-group">
        <label for="email">Email</label>
        <input
          id="email"
          pInputText
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@bymed.com"
        />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <p-password
          inputId="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          autocomplete="current-password"
          placeholder="Password"
          styleClass="password-field"
        />
      </div>

      <div class="meta-row">
        <div class="remember-wrap">
          <p-checkbox
            inputId="rememberMe"
            [binary]="true"
            [ngModel]="rememberMe()"
            (ngModelChange)="rememberMe.set($event)"
            [ngModelOptions]="{ standalone: true }"
          />
          <label for="rememberMe">Remember me</label>
        </div>
        <button class="forgot-link" type="button">Forgot password?</button>
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button pButton type="submit" class="signin-btn" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <p-progressSpinner [style]="{ width: '18px', height: '18px' }" strokeWidth="6"></p-progressSpinner>
          <span>Signing in...</span>
        } @else {
          <span>Sign in</span>
        }
      </button>
    </form>
  </section>
</main>
