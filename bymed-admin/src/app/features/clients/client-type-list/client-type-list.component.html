<section class="page">
  <header class="page-header">
    <h1>Client Types</h1>
    <a pButton routerLink="/client-types/new" label="Add Type"></a>
  </header>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <p-table [value]="rows()" [loading]="isLoading()">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Slug</th>
        <th class="actions">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.name }}</td>
        <td>{{ row.slug }}</td>
        <td class="actions">
          <a pButton [routerLink]="['/client-types', row.id, 'edit']" label="Edit" size="small"></a>
          <button
            pButton
            type="button"
            label="Delete"
            severity="danger"
            size="small"
            [loading]="deletingId() === row.id"
            (click)="delete(row)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
