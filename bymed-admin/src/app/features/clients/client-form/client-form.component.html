<section class="page">
  <header class="page-header">
    <h1>{{ isEditMode ? 'Edit Client' : 'Add Client' }}</h1>
  </header>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  @if (!isInitializing()) {
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <h2 class="section-title">Institution</h2>
      <label>
        Institution Name
        <input pInputText formControlName="institutionName" />
      </label>
      <label>
        Address
        <input pInputText formControlName="address" />
      </label>
      <label>
        Type
        <p-select
          formControlName="clientTypeId"
          [options]="clientTypes()"
          optionLabel="name"
          optionValue="id"
          placeholder="Select type"></p-select>
      </label>
      <label><span>Email</span><input pInputText formControlName="email" type="email" /></label>
      <label><span>Phone</span><input pInputText formControlName="phone" /></label>
      <label><span>Telephone</span><input pInputText formControlName="telephone" /></label>

      <div class="contact-section">
        <div class="contact-section__header">
          <h2 class="section-title">Contact persons</h2>
          <button pButton type="button" label="Add contact" size="small" (click)="addContactPerson()"></button>
        </div>

        <div formArrayName="contactPersons" class="contact-list">
          @for (group of contactPersons.controls; track $index) {
            <fieldset class="contact-card" [formGroupName]="$index">
              <legend>Contact {{ $index + 1 }}</legend>
              <label><span>Name</span><input pInputText formControlName="name" /></label>
              <label><span>Email</span><input pInputText formControlName="email" type="email" /></label>
              <label><span>Phone</span><input pInputText formControlName="phone" /></label>
              <label><span>Faculty</span><input pInputText formControlName="faculty" /></label>
              <button
                pButton
                type="button"
                label="Remove"
                severity="secondary"
                size="small"
                (click)="removeContactPerson($index)"></button>
            </fieldset>
          }
        </div>
      </div>

      <div class="actions">
        <a pButton routerLink="/clients" severity="secondary" label="Cancel"></a>
        <button pButton type="submit" label="Save" [loading]="isSubmitting()"></button>
      </div>
    </form>
  }
</section>
