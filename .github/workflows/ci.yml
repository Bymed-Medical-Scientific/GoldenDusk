name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  api:
    name: API build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BymedWebsite.slnx

      - name: Build
        run: dotnet build BymedWebsite.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Bymed.Tests/Bymed.Tests.csproj --configuration Release --no-build --verbosity normal

  web:
    name: Web lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bymed-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bymed-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --ci --maxWorkers=50%

      - name: Build
        run: npm run build

  admin:
    name: Admin build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bymed-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bymed-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production
